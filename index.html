<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ tính toán Meso </title>
    <style>
        /* --- CSS GIAO DIỆN TÍNH TOÁN --- */
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: #f0f2f5; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0;
            min-height: 100vh;
            /* overflow-x: hidden; Để không bị vỡ giao diện khi ruồi bay sát mép */
        }
        .container { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 500px; 
            margin-bottom: 20px; 
            position: relative; 
            z-index: 10; /* Nằm trên vệt đuôi nhưng dưới con ruồi */
        }
        h2 { color: #1a73e8; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        input:focus { border-color: #1a73e8; outline: none; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-calc { background-color: #1a73e8; color: white; }
        .btn-calc:hover { background-color: #1557b0; }
        .result-area { margin-top: 20px; padding: 15px; background-color: #f8f9fa; border-radius: 8px; border-left: 5px solid #34a853; }
        .result-item { margin-bottom: 10px; font-size: 1.05em; }
        .highlight { color: #d93025; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #eee; margin: 30px 0; width: 100%; max-width: 500px; }
        small { display: block; margin-top: 5px; min-height: 1em; }

        /* --- CSS HIỆU ỨNG RUỒI BAY --- */
        #trail-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9998;
        }
        .trail-dot {
            position: fixed;
            width: 6px; height: 6px;
            background-color: rgba(26, 115, 232, 0.4); /* Đổi sang màu xanh dương cho hợp tone */
            border-radius: 50%;
            will-change: transform, opacity;
            margin-left: -3px; margin-top: -3px;
        }
        #the-fly {
            position: fixed;
            top: 0; left: 0;
            width: 40px; height: 40px;
            background-image: url('https://tainv.dak.edu.vn/vhoangstore/wp-content/uploads/2026/01/maybayicon1-150x150.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
            z-index: 9999;
            margin-left: -20px; margin-top: -20px;
        }
    </style>
</head>
<body>

    <!-- Các thành phần của hiệu ứng -->
    <div id="trail-container"></div>
    <div id="the-fly"></div>


    <!-- CÁCH TÍNH 1 -->
    <div class="container">
        <h2>Cách 1: Chênh lệch Rate</h2>
        <div class="form-group">
            <label>Rate Legion:</label>
            <input type="text" id="rate_legion_1" oninput="formatCurrency(this)">
        </div>
        <div class="form-group">
            <label>Rate Wap:</label>
            <input type="text" id="rate_wap_1" oninput="formatCurrency(this)">
        </div>
        <div class="form-group">
            <label>Tổng số phút:</label>
            <input type="text" id="phut_1" oninput="updateHint(this, 'hint_1')">
            <small id="hint_1" style="color: #666;"></small>
        </div>
        <button class="btn-calc" onclick="tinhCach1()">Tính kết quả</button>
        <div id="res1" class="result-area" style="display:none;">
            <div class="result-item">Kết quả: <span id="ket_qua_1" class="highlight">0</span></div>
        </div>
    </div>
<hr>
    <!-- CÁCH TÍNH 2 -->
    <div class="container">
        <h2>Cách 2: Tổng Meso & Phút</h2>
        <div class="form-group">
            <label>Tổng số phút:</label>
            <input type="text" id="tổng_phút" placeholder="Ví dụ: 240" oninput="updateHint(this, 'convert_hint')">
            <small id="convert_hint" style="color: #666;"></small>
        </div>
        <div class="form-group">
            <label>Rate Legion:</label>
            <input type="text" id="rate_legion_2" placeholder="Ví dụ: 883,000,000" oninput="formatCurrency(this)">
        </div>
        <button class="btn-calc" onclick="tinhCach2()">Tính kết quả</button>
        <div id="res2" class="result-area" style="display:none;">
            <div class="result-item">Số giờ: <span id="hien_thi_gio" class="highlight">0</span></div>
            <div class="result-item">Meso Legion: <span id="meso_legion" class="highlight">0</span> <small>(nhớ chụp hình)</small></div>
            <div class="result-item">Nhớ cộng <span id="hien_thi_gio_2" class="highlight">0</span> vào Task</div>
        </div>
    </div>

    

    <script>
        /* --- LOGIC TÍNH TOÁN --- */
        function formatCurrency(input) {
            let value = input.value.replace(/,/g, '');
            if (value === "") return;
            let parts = value.split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            input.value = parts.join('.');
        }

        function getRawNumber(id) {
            let val = document.getElementById(id).value;
            return parseFloat(val.replace(/,/g, '')) || 0;
        }

        function updateHint(input, hintId) {
            formatCurrency(input);
            const phut = parseFloat(input.value.replace(/,/g, '')) || 0;
            const gio = phut / 60;
            document.getElementById(hintId).innerText = phut > 0 ? " tương đương " + gio.toFixed(2) + " giờ" : "";
        }

        function tinhCach1() {
            const rL = getRawNumber('rate_legion_1');
            const rW = getRawNumber('rate_wap_1');
            const phut = getRawNumber('phut_1');
            const g = phut / 60; 
            const kq = (rL - rW) * g;
            document.getElementById('res1').style.display = 'block';
            document.getElementById('ket_qua_1').innerText = kq.toLocaleString('vi-VN');
        }

        function tinhCach2() {
            const tongPhut = getRawNumber('tổng_phút');
            const rL = getRawNumber('rate_legion_2');
            const gio = tongPhut / 60;
            const mesoLegion = rL * gio;
            document.getElementById('res2').style.display = 'block';
            document.getElementById('hien_thi_gio').innerText = gio.toFixed(2);
            document.getElementById('meso_legion').innerText = mesoLegion.toLocaleString('vi-VN');
            document.getElementById('hien_thi_gio_2').innerText = gio.toFixed(2);
        }

        /* --- LOGIC RUỒI BAY --- */
        const speed = 0.08;
        const trailLength = 20;
        const rotationAdjust = 90;

        const fly = document.getElementById('the-fly');
        const trailContainer = document.getElementById('trail-container');
        let dots = [];
        let history = [];

        for (let i = 0; i < trailLength; i++) {
            const dot = document.createElement('div');
            dot.className = 'trail-dot';
            trailContainer.appendChild(dot);
            dots.push(dot);
        }

        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let flyX = mouseX;
        let flyY = mouseY;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animate() {
            history.push({ x: flyX, y: flyY });
            if (history.length > trailLength) history.shift();

            let distX = mouseX - flyX;
            let distY = mouseY - flyY;
            flyX += distX * speed;
            flyY += distY * speed;

            const angle = Math.atan2(distY, distX);
            const degree = angle * (180 / Math.PI);

            fly.style.transform = `translate(${flyX}px, ${flyY}px) rotate(${degree + rotationAdjust}deg)`;

            for (let i = 0; i < dots.length; i++) {
                const posIndex = history.length - 1 - i;
                if (posIndex >= 0) {
                    const pos = history[posIndex];
                    dots[i].style.transform = `translate(${pos.x}px, ${pos.y}px)`;
                    const scale = 1 - (i / trailLength) * 0.5;
                    const opacity = 1 - (i / trailLength);
                    dots[i].style.opacity = opacity;
                    dots[i].style.transform += ` scale(${scale})`;
                } else {
                    dots[i].style.opacity = 0;
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
